<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Topics Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Polished Input Styling */
        .dropdown-container input[type="text"],
        .dropdown-container select {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            color: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        .dropdown-container input[type="text"]:focus {
            outline: none;
            border-color: #646cff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        /* Slider Styling */
        .slider-control {
            margin: 20px 0;
            text-align: left;
        }
        .slider-control label { display: block; margin-bottom: 10px; font-size: 0.9rem; opacity: 0.8; }
        .slider-control input[type="range"] { width: 100%; cursor: pointer; }
    </style>
</head>
<body data-theme="dark">

    <div class="theme-switcher-container">
        <label class="theme-switcher">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div id="app-container">
        <!-- Settings View -->
        <div id="settings-view" class="card" style="display: none;">
            <h2>Settings</h2>
            <p>Enter comma-separated words for each dropdown.</p>
            <input type="password" id="api-key-input" placeholder="Enter Gemini API Key (Optional)" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #555; background: #333; color: white;">
            <div class="settings-inputs">
                <textarea id="words1" placeholder="Words for Dropdown 1..."></textarea>
                <textarea id="words2" placeholder="Words for Dropdown 2..."></textarea>
                <textarea id="words3" placeholder="Words for Dropdown 3..."></textarea>
            </div>
            <div class="settings-actions">
                <button id="save-settings-btn">Save</button>
                <button id="close-settings-btn">Close</button>
            </div>
        </div>

        <!-- Main View -->
        <div id="main-view" class="card">
            <button id="open-settings-btn" class="settings-icon">⚙️</button>
            <h1>Table Topics Generator</h1>
            <p>Select a word from each category to generate a topic.</p>
            <div class="dropdown-container">
                <select id="dropdown1"></select>
                <select id="dropdown2"></select>
                <input type="text" id="custom-word-input" placeholder="Enter a word">
            </div>
            <div class="slider-control">
                <label for="creativity-slider">Creativity: <span id="creativity-value">0.7</span></label>
                <input type="range" id="creativity-slider" min="0" max="1" step="0.1" value="0.7">
            </div>
            <button id="generate-btn">Generate Topic</button>
        </div>

        <!-- Loading View -->
        <div id="loading-view" class="card" style="display: none;">
            <div class="loading-animation">
                <div class="orb"></div>
                <div class="orb"></div>
                <div class="orb"></div>
                <div class="orb"></div>
            </div>
            <p>Generating your topic...</p>
        </div>

        <!-- Result View -->
        <div id="result-view" style="display: none;">
            <div class="stage">
                <div class="spotlight"></div>
                <div class="mic-container">
                    <!-- Embedded SVG for microphone -->
                    <svg class="mic-svg" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7z"/>
                    </svg>
                </div>
                <div class="topic-display card">
                    <h2 id="generated-topic"></h2>
                </div>
            </div>
            <div class="controls">
                <button id="back-btn">Back</button>
                <button id="reset-btn">New Topic</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
